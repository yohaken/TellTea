name: Repair owner-books ft.. asset → sga

on:
  workflow_dispatch:

jobs:
  repair:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Dry-run list ft.. rows
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/repair-owner-ft-to-sga.mjs

      - name: Apply asset → sga for ft.. rows
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          APPLY: "1"
        run: node scripts/repair-owner-ft-to-sga.mjs
