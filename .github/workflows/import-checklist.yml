name: Import checklist CSV

on:
  push:
    branches: [main]
    paths:
      - "data/TELL TEA - ความพร้อม.csv"
      - "scripts/import-checklist-csv.js"
      - "src/lib/checklist-import.ts"
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Import checklist records
        env:
          CHECK_YEAR: "2026"
          CHECK_MONTH: "7"
          CREATED_BY: yohaken@gmail.com
        run: node scripts/import-checklist-csv.js "data/TELL TEA - ความพร้อม.csv"
