name: Deploy TellTea to Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      # Prefer modern Firebase Storage default — avoid custom hosting domains in secrets.
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: mypeer-501909.firebasestorage.app
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
      NEXT_PUBLIC_OWNER_EMAIL: yohaken@gmail.com
      TELLTEA_OT_STORAGE_BUCKET: mypeer-501909.firebasestorage.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Guard Firestore rules (block incomplete / wiped rules)
        run: npm run test:firestore-rules

      - name: Build static export
        run: npm run build

      - name: Verify install page is in POS export (before APK)
        run: |
          test -f out-pos/install/index.html
          grep -q 'nPos-telltea.apk' out-pos/install/index.html

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build nPos-telltea Hello World APK
        run: |
          java -version
          cd npos-telltea
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Publish APK to POS hosting download path
        run: node scripts/publish-pos-apk.mjs

      - name: Verify back-office static routes
        run: npm run smoke:hosting

      - name: Verify standalone POS hosting export
        run: REQUIRE_POS_APK=1 npm run smoke:pos-hosting

      - name: Verify POS connectivity wiring
        run: npm run test:pos-connectivity

      - name: Verify POS sale transaction ordering
        run: npm run test:pos-complete-sale

      - name: Verify POS offline sync wiring
        run: npm run test:pos-sync

      - name: Verify POS menu + options wiring
        run: npm run test:pos-menu-cart

      - name: Verify POS unified receipt layout
        run: npm run test:pos-receipt-layout

      - name: Verify POS session chaos logic
        run: npm run test:pos-session-chaos

      - name: Verify POS e2e (Playwright — phase 1 + 3 chaos)
        run: |
          npx playwright install chromium
          npx --yes serve out-pos -l 8765 &
          sleep 3
          POS_E2E_URL=http://127.0.0.1:8765/pos/sell/ npm run test:pos-e2e-all

      - name: Enable POS auth domains
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/enable-pos-auth-domains.mjs
        continue-on-error: true

      - name: Enable anonymous sign-in (POS fallback)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/enable-anonymous-auth.mjs
        continue-on-error: true

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Verify + repair OT brew rates by shift date
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/repair-ot-bonus-rates.mjs

      - name: Install Cloud Functions deps
        run: npm ci
        working-directory: functions

      - name: Write Functions env
        run: |
          printf 'VAPID_PUBLIC_KEY=%s\nVAPID_PRIVATE_KEY=%s\nTELLTEA_STORAGE_BUCKET=%s\nGEMINI_API_KEY=%s\n' \
            "${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}" \
            "${{ secrets.VAPID_PRIVATE_KEY }}" \
            "mypeer-501909.firebasestorage.app" \
            "${{ secrets.GEMINI_API_KEY }}" > functions/.env

      - name: Ensure POS hosting site exists
        run: |
          npx firebase-tools@latest hosting:sites:create telltea-pos \
            --project mypeer-501909 --non-interactive 2>/dev/null || true

      - name: Ensure Firebase Storage bucket
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/ensure-storage-bucket.mjs
        continue-on-error: true

      - name: Deploy Hosting + Firestore + Storage + Functions
        run: |
          set +e
          npx firebase-tools@latest deploy --only hosting:telltea,hosting:telltea-pos,firestore,storage,functions --project mypeer-501909 --non-interactive --force
          code=$?
          if [ "$code" -ne 0 ]; then
            echo "WARN full deploy failed — retry without storage"
            npx firebase-tools@latest deploy --only hosting:telltea,hosting:telltea-pos,firestore,functions --project mypeer-501909 --non-interactive --force
            code=$?
          fi
          exit $code

      - name: Verify live install page + APK download
        run: node scripts/smoke-pos-install-live.mjs

      # one-shot channel proof was useful once; keep dedicated ping workflow instead
      # (avoids failing/noise on every deploy when tablets are idle)
