name: Deploy TellTea to Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
      NEXT_PUBLIC_OWNER_EMAIL: yohaken@gmail.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Verify back-office static routes
        run: npm run smoke:hosting

      - name: Verify standalone POS hosting export
        run: npm run smoke:pos-hosting

      - name: Verify POS connectivity wiring
        run: npm run test:pos-connectivity

      - name: Verify POS sale transaction ordering
        run: npm run test:pos-complete-sale

      - name: Verify POS offline sync wiring
        run: npm run test:pos-sync

      - name: Verify POS menu + options wiring
        run: npm run test:pos-menu-cart

      - name: Verify POS e2e (Playwright — nav, menu, sell + timing)
        run: |
          npx playwright install chromium
          npx --yes serve out-pos -l 8765 &
          sleep 3
          POS_E2E_URL=http://127.0.0.1:8765/pos/sell/ npm run test:pos-e2e-all

      - name: Enable POS auth domains
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/enable-pos-auth-domains.mjs
        continue-on-error: true

      - name: Enable anonymous sign-in (POS fallback)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/enable-anonymous-auth.mjs
        continue-on-error: true

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Install Cloud Functions deps
        run: npm ci
        working-directory: functions

      - name: Write Functions env
        run: |
          printf 'VAPID_PUBLIC_KEY=%s\nVAPID_PRIVATE_KEY=%s\n' \
            "${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}" \
            "${{ secrets.VAPID_PRIVATE_KEY }}" > functions/.env

      - name: Ensure POS hosting site exists
        run: |
          npx firebase-tools@latest hosting:sites:create telltea-pos \
            --project mypeer-501909 --non-interactive 2>/dev/null || true

      - name: Deploy Hosting + Firestore + Functions
        run: npx firebase-tools@latest deploy --only hosting:telltea,hosting:telltea-pos,firestore,functions --project mypeer-501909 --non-interactive --force
