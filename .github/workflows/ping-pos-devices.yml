name: Ping online POS devices (owner test popup)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/ping-pos-devices.mjs"
      - ".github/workflows/ping-pos-devices.yml"

jobs:
  ping:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Send owner ping popup to online POS tablets
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          POS_ONLINE_MS: "900000"
          POS_PING_FORCE: "1"
        run: node scripts/ping-pos-devices.mjs
